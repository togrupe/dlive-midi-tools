# Cross-compile workflow that is manually triggered

name: Cross Compile Manual workflow

on:
  workflow_dispatch:
    inputs:
      mytag:
        description: 'Input Tag'
        default: '0.0.0'
        required: true
        type: string
      suffix:
        description: 'Version suffix'
        default: ''
        required: false
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-15-intel
            platform: macos-x86_64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build Executable
        uses: Nuitka/Nuitka-Action@v1.2
        with:
          nuitka-version: 2.5.9
          script-name: src/Main.py
          file-version: ${{ github.event.inputs.mytag }}
          onefile: true
          enable-plugins: tk-inter
          output-file: dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}

      - name: Make artifact executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x build/dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}

      - name: Create wrapper script (Unix)
        if: runner.os != 'Windows'
        run: |
          BINARY=dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}
          printf '#!/bin/sh\nDIR="$(cd "$(dirname "$0")" && pwd)"\nexec "$DIR/%s" "$@"\n' "$BINARY" > start.sh
          chmod +x start.sh

      - name: Collect release files (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir output
          cp AvantisChannelList.xlsx AvantisChannelList.ods dLiveChannelList.xlsx dLiveChannelList.ods MixingStationChannelList.xlsx ThirdParty-Licenses.txt LICENSE output/
          cp build/dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }} output/
          cp start.sh output/
          cd output && zip -r ../dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}.zip .

      - name: Collect release files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory output
          Copy-Item AvantisChannelList.xlsx, AvantisChannelList.ods, dLiveChannelList.xlsx, dLiveChannelList.ods, MixingStationChannelList.xlsx, ThirdParty-Licenses.txt, LICENSE output\
          Copy-Item build\dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}.exe output\
          Compress-Archive -Path output\* -DestinationPath dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}
          if-no-files-found: warn
          path: dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}.zip

      - name: Create/Update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          commit: main
          tag: v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}
          artifacts: dmt-v${{ github.event.inputs.mytag }}${{ github.event.inputs.suffix }}-${{ matrix.platform }}.zip
